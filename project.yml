name: BrightSync
options:
  bundleIdPrefix: com.eriknielsen
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  BrightSync:
    build:
      targets:
        BrightSync: all

targets:
  BrightSync:
    type: application
    platform: macOS
    sources:
      - path: BrightSync
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eriknielsen.brightsync
        PRODUCT_NAME: BrightSync
        INFOPLIST_FILE: BrightSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: BrightSync/BrightSync.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
